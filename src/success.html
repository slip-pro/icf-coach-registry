<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ICF Cyprus — Registration Submitted</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      padding: 0;
      min-height: 100vh;
      background: #ffffff;
      font-family: 'Plus Jakarta Sans', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .success-box {
      max-width: 600px;
      margin: 40px 20px;
      padding: 48px 32px;
      text-align: center;
      background: #ffffff;
      border: 1px solid #e0dcd4;
      border-radius: 16px;
      color: #212251;
    }
    .success-box h1 {
      font-family: 'Nunito', sans-serif;
      font-size: 24px;
      font-weight: 800;
      color: #212251;
      margin: 0 0 16px;
    }
    .success-box p {
      font-size: 16px;
      line-height: 1.6;
      color: #2b379b;
      margin: 0 0 24px;
    }
    .success-box a {
      display: inline-block;
      padding: 14px 24px;
      background: #efcb30;
      color: #212251;
      text-decoration: none;
      border-radius: 14px;
      font-family: 'Nunito', sans-serif;
      font-weight: 700;
      font-size: 15px;
      transition: background 0.2s ease;
    }
    .success-box a:hover { background: #e0bc20; }
    .success-box a:focus-visible {
      outline: 2px solid #5778fa;
      outline-offset: 2px;
    }
  </style>
</head>
<body>
  <div class="success-box">
    <h1 id="title">Your profile has been submitted!</h1>
    <p id="text">The ICF Cyprus administrator will review your application and you'll receive a confirmation by email.</p>
    <a id="link" href="../public/embed-example.html">View Coach Registry</a>
  </div>
  <script>
    // Detect language from localStorage or URL param
    var lang = localStorage.getItem('icf-lang') || 'en';
    var msgs = {
      en: {
        title: 'Your profile has been submitted!',
        text: 'The ICF Cyprus administrator will review your application and you\'ll receive a confirmation by email.'
      },
      ru: {
        title: 'Ваш профиль отправлен!',
        text: 'Администратор ICF Cyprus рассмотрит заявку, и вы получите подтверждение по email.'
      },
      el: {
        title: 'Το προφίλ σας υποβλήθηκε!',
        text: 'Ο διαχειριστής του ICF Cyprus θα εξετάσει την αίτησή σας και θα λάβετε επιβεβαίωση μέσω email.'
      }
    };
    var links = {
      en: 'View Coach Registry',
      ru: 'Перейти в каталог коучей',
      el: 'Προβολή μητρώου coaches',
    };
    var m = msgs[lang] || msgs.en;
    document.getElementById('title').textContent = m.title;
    document.getElementById('text').textContent = m.text;
    document.getElementById('link').textContent = links[lang] || links.en;
  </script>
</body>
</html>
