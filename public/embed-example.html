<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ICF Cyprus - Find a Coach (WordPress Embed Example)</title>

  <!--
    ==========================================================
    WordPress Embed Example
    ==========================================================
    This page simulates a WordPress environment to test the
    ICF Coach Registry widget in isolation.

    In a real WordPress page, you only need TWO things:

    1. A container div:
       <div id="icf-coach-registry"></div>

    2. The widget script (placed before </body>):
       <script type="module">
         import { ICFRegistry } from '/path/to/js/app.js';
         ICFRegistry.init({ sheetId: 'YOUR_GOOGLE_SHEET_ID' });
       </script>

    The widget loads its own CSS and fonts. All styles are
    scoped with the `icf-` prefix so they do not conflict
    with the WordPress theme.
    ==========================================================
  -->

  <!-- Simulated WordPress theme styles -->
  <style>
    /* Simulate a typical WP theme reset & base styles */
    *, *::before, *::after {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 0;
      font-family: Georgia, 'Times New Roman', serif;
      font-size: 16px;
      line-height: 1.8;
      color: #333;
      background: #ffffff;
    }

    a {
      color: #0073aa;
      text-decoration: underline;
    }

    h1, h2, h3 {
      font-family: Georgia, serif;
      color: #23282d;
    }

    /* Simulated WP header */
    .wp-header {
      background: #23282d;
      color: #ffffff;
      padding: 16px 24px;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 14px;
    }

    .wp-header a {
      color: #ffffff;
      text-decoration: none;
      font-weight: 600;
    }

    .wp-header nav {
      display: flex;
      gap: 24px;
      max-width: 1200px;
      margin: 0 auto;
    }

    /* Simulated WP content area */
    .wp-content {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 24px;
    }

    .wp-content h1 {
      font-size: 32px;
      margin: 32px 0 16px;
    }

    .wp-content p {
      margin-bottom: 16px;
    }

    /* Simulated WP footer */
    .wp-footer {
      background: #f1f1f1;
      padding: 24px;
      text-align: center;
      font-size: 13px;
      color: #666;
      margin-top: 40px;
      border-top: 1px solid #ddd;
    }
  </style>

  <!-- Google Fonts for the widget -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap"
        rel="stylesheet">

  <!-- Widget CSS -->
  <link rel="stylesheet" href="../src/styles/main.css">
</head>
<body>

  <!-- Simulated WordPress header -->
  <header class="wp-header">
    <nav>
      <a href="#">ICF Cyprus</a>
      <a href="#">About</a>
      <a href="#">Events</a>
      <a href="#">Find a Coach</a>
      <a href="#">Contact</a>
    </nav>
  </header>

  <!-- Simulated WordPress page content -->
  <main class="wp-content">

    <!--
      ==================================================
      EMBED SNIPPET — Copy this into your WordPress page
      ==================================================
    -->
    <div id="icf-coach-registry"></div>
    <!-- ============================================ -->

  </main>

  <!-- Simulated WordPress footer -->
  <footer class="wp-footer">
    ICF Cyprus Chapter &copy; 2025. All rights reserved.
  </footer>

  <!--
    ==================================================
    WIDGET INITIALIZATION
    Add this script before </body> in your WordPress page.
    Replace 'YOUR_GOOGLE_SHEET_ID' with the actual Sheet ID.
    ==================================================
  -->
  <script type="module">
    import { ICFRegistry } from '../src/js/app.js';

    ICFRegistry.init({
      sheetId: '1eloH2qMpKIDypcrbuA4L0Sav7qmGNKkRsLJJQHpUojM',
    });
  </script>

</body>
</html>
